workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 30

    environment:
      groups:
        - keystore_credentials
      java: 17

    scripts:
      - name: Set gradlew executable
        script: chmod +x gradlew

      - name: Générer le Gradle wrapper
        script: gradle wrapper --gradle-version 8.4

      - name: Décoder le keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/almanach_keystore.jks

      - name: Build APK release signé
        script: ./gradlew assembleRelease

    artifacts:
      - app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - tbouffand@st-ambroise.org
        notify:
          success: true
          failure: true
