workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 30

    environment:
      groups:
        - keystore_credentials   # Contient CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_STORE_PASSWORD

    scripts:
      - name: Set gradlew executable
        script: chmod +x gradlew

      - name: Install Gradle wrapper if missing
        script: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.4
          fi

      - name: Décoder le keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/almanach_keystore.jks

      - name: Build APK release signé
        script: ./gradlew assembleRelease

    artifacts:
      - app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - tbouffand@st-ambroise.org
        notify:
          success: true
          failure: true
